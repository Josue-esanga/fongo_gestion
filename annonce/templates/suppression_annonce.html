{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Django Tailwind</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% tailwind_css %}
</head>

<body class="bg-gray-50 w-full h-screen flex justify-center items-center text-black font-serif leading-normal tracking-normal">
    <form method="post" class="space-y-4 border border-gray-300 shadow-2xl w-[35%] min-h-[10%] flex flex-col gap-4 rounded-2xl p-6">
        <p class="text-center font-semibold">Voulez-vous vraiment supprimer cette annonce ?</p>
        {% csrf_token %}
        
        <div class="flex flex-col justify-center space-y-3">
            <button type="submit" class="btn btn-error text-[16px]">Oui, supprimer</button>
            <a href="{% url "annonce" %}" class="btn btn-primary text-[16px]">Annuler</a>
        </div> 
</form>
</body>
</html>
