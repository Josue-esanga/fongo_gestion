{% extends "base.html" %}

{% block content %}


<a class="bg-blue-500 text-white px-4 py-3 rounded-2xl hover:bg-blue-600" href="{% url "add_annonce" %}">Ajouter une annonce</a>


<ul class="list bg-base-100 rounded-box shadow-md mt-10" >
  {% for annonce in annonces %}
  
  <li class="list-row bg-white mb-2" >
      <div><img class="size-10 rounded-box" src="https://img.daisyui.com/images/profile/demo/4@94.webp"/></div>
      <div>
          <div class="text-[18px]">{{annonce.object}}</div>
      <div class="text-xs uppercase font-semibold opacity-60">{{annonce.poster_a}}</div>
    </div>
    <p class="list-col-wrap text-xs">
     {{annonce.contenu}}
    </p>
    <button class="btn btn-square btn-ghost">
        <svg class="size-[1.2em]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></g></svg>
    </button>
</li>
{% endfor %}

  
</ul>
{% endblock content %}
